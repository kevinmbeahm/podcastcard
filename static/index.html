<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PodcastCard — Mandarin Vocabulary Extractor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #5c7cfa;
    --accent-dim: #3d5af1;
    --text: #e2e8f0;
    --text-dim: #8892a4;
    --green: #4ade80;
    --yellow: #fbbf24;
    --red: #f87171;
    --hsk1: #4ade80; --hsk2: #34d399; --hsk3: #22d3ee;
    --hsk4: #818cf8; --hsk5: #c084fc; --hsk6: #f472b6; --hsk0: #94a3b8;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #sidebar h2 {
    padding: 18px 16px 14px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
  }

  #episode-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .episode-item {
    padding: 10px 16px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background .15s;
  }

  .episode-item:hover { background: var(--surface2); }
  .episode-item.active { border-left-color: var(--accent); background: var(--surface2); }

  .episode-item .ep-title {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .episode-item .ep-date {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  /* ── Main ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 20px 28px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  header h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 14px;
  }

  header h1 span { color: var(--accent); }

  /* ── Form ── */
  #analyze-form {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: flex-end;
  }

  #url-input {
    flex: 1;
    min-width: 240px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 9px 14px;
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }

  #url-input:focus { border-color: var(--accent); }
  #url-input::placeholder { color: var(--text-dim); }

  select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 9px 12px;
    font-size: 14px;
    outline: none;
    cursor: pointer;
  }

  .hsk-checks {
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }

  .hsk-checks label {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    cursor: pointer;
    padding: 6px 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    transition: border-color .15s;
  }

  .hsk-checks label:hover { border-color: var(--accent); }

  .hsk-checks input[type=checkbox] { accent-color: var(--accent); }

  button.btn-primary {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 9px 22px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
    white-space: nowrap;
  }

  button.btn-primary:hover { background: var(--accent-dim); }
  button.btn-primary:disabled { opacity: .5; cursor: not-allowed; }

  /* ── Progress ── */
  #progress-area {
    display: none;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .stages {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }

  .stage-pill {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border);
    transition: all .2s;
  }

  .stage-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .stage-pill.done { background: #166534; color: var(--green); border-color: #166534; }
  .stage-pill.error { background: #7f1d1d; color: var(--red); border-color: #7f1d1d; }

  #progress-msg { font-size: 13px; color: var(--text-dim); }

  /* ── Results ── */
  #results-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 28px;
    display: none;
  }

  #results-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }

  #results-summary { font-size: 14px; color: var(--text-dim); }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 7px 16px;
    font-size: 13px;
    cursor: pointer;
    text-decoration: none;
    transition: border-color .15s;
  }

  .btn-secondary:hover { border-color: var(--accent); }

  /* Filter tabs */
  #level-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }

  .level-tab {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 2px solid transparent;
    background: var(--surface2);
    color: var(--text-dim);
    transition: all .15s;
  }

  .level-tab:hover { color: var(--text); }
  .level-tab.active { color: #fff; }
  .level-tab[data-level="all"].active { background: var(--accent); border-color: var(--accent); }
  .level-tab[data-level="1"].active  { background: var(--hsk1); border-color: var(--hsk1); color: #000; }
  .level-tab[data-level="2"].active  { background: var(--hsk2); border-color: var(--hsk2); color: #000; }
  .level-tab[data-level="3"].active  { background: var(--hsk3); border-color: var(--hsk3); color: #000; }
  .level-tab[data-level="4"].active  { background: var(--hsk4); border-color: var(--hsk4); }
  .level-tab[data-level="5"].active  { background: var(--hsk5); border-color: var(--hsk5); }
  .level-tab[data-level="6"].active  { background: var(--hsk6); border-color: var(--hsk6); }
  .level-tab[data-level="0"].active  { background: var(--hsk0); border-color: var(--hsk0); color: #000; }

  /* HSK section headers */
  .hsk-section { margin-bottom: 28px; }

  .hsk-section-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 2px solid var(--border);
  }

  /* Word grid */
  .word-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
  }

  .word-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    position: relative;
  }

  .word-card:hover { border-color: var(--accent); background: var(--surface2); }
  .word-card.expanded { border-color: var(--accent); }

  .word-char {
    font-size: 28px;
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 4px;
  }

  .word-pinyin {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .word-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .hsk-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
    color: #000;
  }

  .freq-count { font-size: 11px; color: var(--text-dim); }

  .contexts-panel {
    display: none;
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
  }

  .word-card.expanded .contexts-panel { display: block; }

  .context-sentence {
    font-size: 13px;
    color: var(--text-dim);
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
    line-height: 1.5;
  }

  .context-sentence:last-child { border-bottom: none; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── Empty state ── */
  #empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    padding: 60px 28px;
    text-align: center;
    color: var(--text-dim);
  }

  #empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  #empty-state p { font-size: 15px; max-width: 360px; }
</style>
</head>
<body>

<!-- Sidebar: episode history -->
<aside id="sidebar">
  <h2>History</h2>
  <div id="episode-list"><p style="padding:12px 16px;font-size:13px;color:var(--text-dim)">No episodes yet.</p></div>
</aside>

<!-- Main panel -->
<div id="main">
  <header>
    <h1>Podcast<span>Card</span></h1>
    <form id="analyze-form" onsubmit="return false;">
      <input id="url-input" type="url" placeholder="Paste podcast or video URL…" required>
      <select id="model-select">
        <option value="tiny">Whisper: tiny</option>
        <option value="base" selected>Whisper: base</option>
        <option value="small">Whisper: small</option>
        <option value="medium">Whisper: medium</option>
        <option value="large-v2">Whisper: large-v2</option>
      </select>
      <div class="hsk-checks" id="hsk-checks">
        <span style="font-size:13px;color:var(--text-dim);margin-right:2px">HSK:</span>
        <label><input type="checkbox" value="1" checked> 1</label>
        <label><input type="checkbox" value="2" checked> 2</label>
        <label><input type="checkbox" value="3" checked> 3</label>
        <label><input type="checkbox" value="4" checked> 4</label>
        <label><input type="checkbox" value="5" checked> 5</label>
        <label><input type="checkbox" value="6" checked> 6</label>
        <label><input type="checkbox" value="0" checked> Unknown</label>
      </div>
      <button class="btn-primary" id="analyze-btn" onclick="startAnalysis()">Analyze</button>
    </form>
  </header>

  <!-- Progress -->
  <div id="progress-area">
    <div class="stages">
      <div class="stage-pill" id="pill-downloading">Downloading</div>
      <div class="stage-pill" id="pill-transcribing">Transcribing</div>
      <div class="stage-pill" id="pill-extracting">Extracting</div>
      <div class="stage-pill" id="pill-done">Done</div>
    </div>
    <div id="progress-msg">Starting…</div>
  </div>

  <!-- Results -->
  <div id="results-area">
    <div id="results-header">
      <div id="results-summary"></div>
      <a id="export-link" class="btn-secondary" href="#" download>Export CSV</a>
    </div>
    <div id="level-tabs"></div>
    <div id="word-sections"></div>
  </div>

  <!-- Empty state -->
  <div id="empty-state">
    <div class="icon">🎙️</div>
    <p>Paste a Mandarin podcast or video URL above to extract and study vocabulary by HSK level.</p>
  </div>
</div>

<script>
const HSK_COLORS = { 1:'#4ade80',2:'#34d399',3:'#22d3ee',4:'#818cf8',5:'#c084fc',6:'#f472b6',0:'#94a3b8' };
const HSK_TEXT   = { 1:'#000',2:'#000',3:'#000',4:'#fff',5:'#fff',6:'#fff',0:'#000' };
const STAGES     = ['downloading','transcribing','extracting','done'];

let currentEpisodeId = null;
let allWords = [];

// ── Init ────────────────────────────────────────────────────────────────────

async function init() {
  await loadEpisodes();
}

// ── Episode history ──────────────────────────────────────────────────────────

async function loadEpisodes() {
  const res = await fetch('/episodes');
  if (!res.ok) return;
  const episodes = await res.json();
  const list = document.getElementById('episode-list');
  if (!episodes.length) { list.innerHTML = '<p style="padding:12px 16px;font-size:13px;color:var(--text-dim)">No episodes yet.</p>'; return; }
  list.innerHTML = episodes.map(ep => `
    <div class="episode-item" data-id="${ep.id}" onclick="loadEpisode(${ep.id}, this)">
      <div class="ep-title">${escHtml(ep.title)}</div>
      <div class="ep-date">${new Date(ep.created_at).toLocaleDateString()}</div>
    </div>
  `).join('');
}

async function loadEpisode(id, el) {
  document.querySelectorAll('.episode-item').forEach(e => e.classList.remove('active'));
  if (el) el.classList.add('active');
  const res = await fetch(`/episodes/${id}/words`);
  if (!res.ok) return;
  const words = await res.json();
  currentEpisodeId = id;
  renderResults(words, id);
}

// ── Analysis ─────────────────────────────────────────────────────────────────

function getCheckedLevels() {
  return [...document.querySelectorAll('#hsk-checks input:checked')].map(i => i.value).join(',') || 'all';
}

function setStage(stage) {
  STAGES.forEach(s => {
    const pill = document.getElementById(`pill-${s}`);
    const idx_s = STAGES.indexOf(s), idx_cur = STAGES.indexOf(stage);
    if (s === stage) pill.className = 'stage-pill active';
    else if (idx_s < idx_cur) pill.className = 'stage-pill done';
    else pill.className = 'stage-pill';
  });
}

function startAnalysis() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) return;
  const model = document.getElementById('model-select').value;
  const hsk_levels = getCheckedLevels();

  document.getElementById('analyze-btn').disabled = true;
  document.getElementById('progress-area').style.display = 'block';
  document.getElementById('results-area').style.display = 'none';
  document.getElementById('empty-state').style.display = 'none';
  STAGES.forEach(s => document.getElementById(`pill-${s}`).className = 'stage-pill');
  setStage('downloading');

  const params = new URLSearchParams({ url, model, hsk_levels });
  const es = new EventSource(`/analyze/stream?${params}`);

  es.onmessage = (e) => {
    const data = JSON.parse(e.data);
    document.getElementById('progress-msg').textContent = data.message;

    if (data.stage === 'error') {
      STAGES.forEach(s => document.getElementById(`pill-${s}`).className = 'stage-pill error');
      document.getElementById('progress-msg').style.color = 'var(--red)';
      es.close();
      document.getElementById('analyze-btn').disabled = false;
      return;
    }

    setStage(data.stage);

    if (data.stage === 'done' && data.result) {
      es.close();
      currentEpisodeId = data.result.episode_id;
      renderResults(data.result.words, data.result.episode_id);
      loadEpisodes();
      document.getElementById('analyze-btn').disabled = false;
    }
  };

  es.onerror = () => {
    document.getElementById('progress-msg').textContent = 'Connection error.';
    es.close();
    document.getElementById('analyze-btn').disabled = false;
  };
}

// ── Rendering ────────────────────────────────────────────────────────────────

function renderResults(words, episodeId) {
  allWords = words;
  document.getElementById('results-area').style.display = 'block';
  document.getElementById('empty-state').style.display = 'none';

  const levels = [...new Set(words.map(w => w.hsk_level))].sort((a,b) => a === 0 ? 1 : b === 0 ? -1 : a - b);

  // Summary
  document.getElementById('results-summary').textContent =
    `${words.length} words · ${levels.length} HSK level${levels.length !== 1 ? 's' : ''}`;

  // Export link
  document.getElementById('export-link').href = `/episodes/${episodeId}/export.csv`;

  // Tabs
  const tabs = document.getElementById('level-tabs');
  tabs.innerHTML = `<div class="level-tab active" data-level="all" onclick="filterLevel('all', this)">All</div>` +
    levels.map(l => `<div class="level-tab" data-level="${l}" style="--c:${HSK_COLORS[l]}" onclick="filterLevel(${l}, this)">${l === 0 ? 'Unknown' : 'HSK ' + l}</div>`).join('');

  renderWordSections(words, levels);
}

function filterLevel(level, el) {
  document.querySelectorAll('.level-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  const filtered = level === 'all' ? allWords : allWords.filter(w => w.hsk_level === level);
  const levels = level === 'all'
    ? [...new Set(allWords.map(w => w.hsk_level))].sort((a,b) => a===0?1:b===0?-1:a-b)
    : [level];
  renderWordSections(filtered, levels);
}

function renderWordSections(words, levels) {
  const container = document.getElementById('word-sections');
  container.innerHTML = levels.map(level => {
    const group = words.filter(w => w.hsk_level === level);
    if (!group.length) return '';
    const label = level === 0 ? 'Unknown / Non-HSK' : `HSK Level ${level}`;
    const color = HSK_COLORS[level] || '#94a3b8';
    return `
      <div class="hsk-section">
        <div class="hsk-section-title" style="color:${color};border-color:${color}33">${label} <span style="font-weight:400;color:var(--text-dim)">(${group.length})</span></div>
        <div class="word-grid">${group.map(wordCard).join('')}</div>
      </div>`;
  }).join('');
}

function wordCard(w) {
  const color = HSK_COLORS[w.hsk_level] || '#94a3b8';
  const textColor = HSK_TEXT[w.hsk_level] || '#000';
  const badge = w.hsk_level === 0 ? '—' : `HSK ${w.hsk_level}`;
  const contexts = w.contexts.map(c => `<div class="context-sentence">${escHtml(c)}</div>`).join('');
  const freq = w.frequency === 1 ? '1 occurrence' : `${w.frequency} occurrences`;
  return `
    <div class="word-card" onclick="this.classList.toggle('expanded')">
      <div class="word-char">${escHtml(w.word)}</div>
      <div class="word-pinyin">${escHtml(w.pinyin)}</div>
      <div class="word-meta">
        <span class="hsk-badge" style="background:${color};color:${textColor}">${badge}</span>
        <span class="freq-count">${freq}</span>
      </div>
      ${contexts ? `<div class="contexts-panel">${contexts}</div>` : ''}
    </div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
