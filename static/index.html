<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PodcastCard</title>
  <style>
    /* ------------------------------------------------------------------ Reset */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ------------------------------------------------------------------ Variables */
    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface2:  #22263a;
      --border:    #2e3250;
      --accent:    #6c63ff;
      --accent2:   #a78bfa;
      --text:      #e2e8f0;
      --text-muted:#8892a4;
      --danger:    #f87171;
      --success:   #34d399;

      --hsk1: #22c55e;
      --hsk2: #84cc16;
      --hsk3: #eab308;
      --hsk4: #f97316;
      --hsk5: #ef4444;
      --hsk6: #a855f7;
      --hsk0: #6b7280;

      --radius: 10px;
      --radius-sm: 6px;
      --transition: 150ms ease;
    }

    /* ------------------------------------------------------------------ Base */
    html { font-size: 16px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a { color: var(--accent2); text-decoration: none; }
    a:hover { text-decoration: underline; }

    h1, h2, h3 { line-height: 1.3; }

    /* ------------------------------------------------------------------ Layout */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: 1.25rem;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header .tagline {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      flex: 1;
      min-height: 0;
    }

    /* ------------------------------------------------------------------ Sidebar */
    #sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar h2 {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 16px 16px 8px;
    }

    #episode-list {
      list-style: none;
      overflow-y: auto;
      flex: 1;
    }

    #episode-list li {
      border-bottom: 1px solid var(--border);
    }

    #episode-list button {
      width: 100%;
      background: none;
      border: none;
      padding: 12px 16px;
      text-align: left;
      cursor: pointer;
      color: var(--text);
      transition: background var(--transition);
    }

    #episode-list button:hover,
    #episode-list button.active {
      background: var(--surface2);
    }

    #episode-list .ep-title {
      font-size: 0.875rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }

    #episode-list .ep-date {
      font-size: 0.75rem;
      color: var(--text-muted);
      display: block;
      margin-top: 2px;
    }

    #sidebar-empty {
      color: var(--text-muted);
      font-size: 0.85rem;
      padding: 16px;
      text-align: center;
    }

    /* ------------------------------------------------------------------ Main */
    #main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ------------------------------------------------------------------ Form */
    #form-section {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px;
    }

    .form-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .url-group { flex: 1; min-width: 260px; }

    input[type="text"],
    select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 0.95rem;
      padding: 9px 12px;
      outline: none;
      transition: border-color var(--transition);
      width: 100%;
    }

    input[type="text"]:focus,
    select:focus {
      border-color: var(--accent);
    }

    select {
      cursor: pointer;
      min-width: 130px;
    }

    /* HSK level checkboxes */
    .hsk-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .hsk-checkboxes {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .hsk-check {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      font-size: 0.85rem;
      padding: 5px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      transition: background var(--transition), border-color var(--transition);
      user-select: none;
    }

    .hsk-check input { display: none; }

    .hsk-check:has(input:checked) { border-color: transparent; }

    .hsk-check[data-level="1"]:has(input:checked) { background: var(--hsk1); color: #000; }
    .hsk-check[data-level="2"]:has(input:checked) { background: var(--hsk2); color: #000; }
    .hsk-check[data-level="3"]:has(input:checked) { background: var(--hsk3); color: #000; }
    .hsk-check[data-level="4"]:has(input:checked) { background: var(--hsk4); color: #fff; }
    .hsk-check[data-level="5"]:has(input:checked) { background: var(--hsk5); color: #fff; }
    .hsk-check[data-level="6"]:has(input:checked) { background: var(--hsk6); color: #fff; }
    .hsk-check[data-level="0"]:has(input:checked) { background: var(--hsk0); color: #fff; }

    /* Analyze button */
    #analyze-btn {
      background: var(--accent);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 9px 22px;
      transition: opacity var(--transition), transform var(--transition);
      white-space: nowrap;
      align-self: flex-end;
    }

    #analyze-btn:hover { opacity: 0.88; }
    #analyze-btn:active { transform: scale(0.97); }
    #analyze-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ------------------------------------------------------------------ Progress */
    #progress-section {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: none;
    }

    #progress-section.visible { display: block; }

    .stages {
      display: flex;
      gap: 0;
      margin-bottom: 10px;
    }

    .stage-item {
      flex: 1;
      text-align: center;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      padding: 6px 4px;
      border-bottom: 3px solid var(--border);
      color: var(--text-muted);
      transition: all var(--transition);
    }

    .stage-item.active {
      border-color: var(--accent);
      color: var(--accent2);
    }

    .stage-item.done {
      border-color: var(--success);
      color: var(--success);
    }

    .stage-item.error {
      border-color: var(--danger);
      color: var(--danger);
    }

    #status-msg {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ------------------------------------------------------------------ Results */
    #results-section {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: none;
    }

    #results-section.visible { display: block; }

    /* Summary bar */
    #summary-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    #summary-text {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    #export-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      cursor: pointer;
      font-size: 0.85rem;
      padding: 6px 14px;
      transition: background var(--transition);
      margin-left: auto;
    }

    #export-btn:hover { background: var(--surface); }

    /* Filter tabs */
    #filter-tabs {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .tab-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 5px 14px;
      transition: all var(--transition);
    }

    .tab-btn:hover { border-color: var(--accent); color: var(--text); }
    .tab-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Word sections */
    .hsk-section { margin-bottom: 28px; }

    .hsk-section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .hsk-section-header h3 {
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .hsk-section-count {
      font-size: 0.75rem;
      color: var(--text-muted);
      background: var(--surface2);
      border-radius: 20px;
      padding: 2px 10px;
    }

    /* Word grid */
    .word-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }

    /* Word card */
    .word-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color var(--transition), transform var(--transition);
      cursor: pointer;
    }

    .word-card:hover { border-color: var(--accent); transform: translateY(-2px); }

    .word-card-top {
      padding: 14px 14px 10px;
    }

    .word-char {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.1;
      display: block;
    }

    .word-pinyin {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 3px;
      display: block;
    }

    .word-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 14px 10px;
    }

    .hsk-badge {
      font-size: 0.7rem;
      font-weight: 700;
      border-radius: 4px;
      padding: 2px 7px;
      letter-spacing: 0.04em;
    }

    .hsk-badge.lv1 { background: var(--hsk1); color: #000; }
    .hsk-badge.lv2 { background: var(--hsk2); color: #000; }
    .hsk-badge.lv3 { background: var(--hsk3); color: #000; }
    .hsk-badge.lv4 { background: var(--hsk4); color: #fff; }
    .hsk-badge.lv5 { background: var(--hsk5); color: #fff; }
    .hsk-badge.lv6 { background: var(--hsk6); color: #fff; }
    .hsk-badge.lv0 { background: var(--hsk0); color: #fff; }

    .word-freq {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* Context drawer */
    .word-contexts {
      border-top: 1px solid var(--border);
      background: var(--surface2);
      padding: 0 14px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 300ms ease, padding 200ms ease;
    }

    .word-contexts.open {
      max-height: 400px;
      padding: 10px 14px;
    }

    .context-sentence {
      font-size: 0.82rem;
      color: var(--text-muted);
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
      line-height: 1.5;
    }

    .context-sentence:last-child { border-bottom: none; }

    /* ------------------------------------------------------------------ Empty state */
    #empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-muted);
    }

    #empty-state .big-icon {
      font-size: 3rem;
      margin-bottom: 12px;
    }

    #empty-state h2 { color: var(--text); margin-bottom: 8px; }

    /* ------------------------------------------------------------------ Responsive */
    @media (max-width: 720px) {
      .layout { grid-template-columns: 1fr; }
      #sidebar { display: none; }
    }

    @media (max-width: 540px) {
      .form-row { flex-direction: column; }
      #analyze-btn { width: 100%; }
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <h1>PodcastCard</h1>
  <span class="tagline">Chinese vocabulary from podcasts</span>
</header>

<div class="layout">
  <!-- Sidebar: episode history -->
  <aside id="sidebar">
    <h2>Episode History</h2>
    <ul id="episode-list">
      <li id="sidebar-empty">No episodes yet</li>
    </ul>
  </aside>

  <!-- Main content -->
  <div id="main">

    <!-- Form -->
    <section id="form-section">
      <div class="form-row">
        <div class="form-group url-group">
          <label for="url-input">Podcast / Video URL</label>
          <input
            type="text"
            id="url-input"
            placeholder="https://www.youtube.com/watch?v=..."
            autocomplete="off"
            spellcheck="false"
          />
        </div>

        <div class="form-group">
          <label for="model-select">Whisper Model</label>
          <select id="model-select">
            <option value="tiny">Tiny (fastest)</option>
            <option value="base" selected>Base</option>
            <option value="small">Small</option>
            <option value="medium">Medium</option>
            <option value="large-v2">Large v2 (best)</option>
          </select>
        </div>

        <div class="form-group hsk-group">
          <label>HSK Levels</label>
          <div class="hsk-checkboxes">
            <label class="hsk-check" data-level="1">
              <input type="checkbox" name="hsk" value="1" checked />HSK 1
            </label>
            <label class="hsk-check" data-level="2">
              <input type="checkbox" name="hsk" value="2" checked />HSK 2
            </label>
            <label class="hsk-check" data-level="3">
              <input type="checkbox" name="hsk" value="3" checked />HSK 3
            </label>
            <label class="hsk-check" data-level="4">
              <input type="checkbox" name="hsk" value="4" checked />HSK 4
            </label>
            <label class="hsk-check" data-level="5">
              <input type="checkbox" name="hsk" value="5" checked />HSK 5
            </label>
            <label class="hsk-check" data-level="6">
              <input type="checkbox" name="hsk" value="6" checked />HSK 6
            </label>
            <label class="hsk-check" data-level="0">
              <input type="checkbox" name="hsk" value="0" checked />Unknown
            </label>
          </div>
        </div>

        <button id="analyze-btn">Analyze</button>
      </div>
    </section>

    <!-- Progress -->
    <section id="progress-section">
      <div class="stages">
        <div class="stage-item" id="stage-downloading">Downloading</div>
        <div class="stage-item" id="stage-transcribing">Transcribing</div>
        <div class="stage-item" id="stage-extracting">Extracting</div>
        <div class="stage-item" id="stage-done">Done</div>
      </div>
      <div id="status-msg"><span class="spinner"></span>Starting…</div>
    </section>

    <!-- Results -->
    <section id="results-section">
      <!-- Empty state (shown before first analysis) -->
      <div id="empty-state">
        <div class="big-icon">🎙️</div>
        <h2>Ready to analyze</h2>
        <p>Enter a podcast or YouTube URL above and click Analyze.</p>
      </div>

      <!-- Populated after analysis -->
      <div id="results-content" style="display:none">
        <div id="summary-bar">
          <span id="summary-text"></span>
          <button id="export-btn">Export CSV</button>
        </div>
        <div id="filter-tabs"></div>
        <div id="word-sections"></div>
      </div>
    </section>

  </div><!-- #main -->
</div><!-- .layout -->

<script>
'use strict';

// -----------------------------------------------------------------------
// State
// -----------------------------------------------------------------------
let currentEpisodeId = null;
let currentWords = [];   // full unfiltered word list from last result
let activeTab = 'all';

// -----------------------------------------------------------------------
// Utility
// -----------------------------------------------------------------------
const $ = id => document.getElementById(id);

function hskLabel(level) {
  return level === 0 ? 'Unknown' : `HSK ${level}`;
}

function hskColor(level) {
  const map = { 1:'hsk1', 2:'hsk2', 3:'hsk3', 4:'hsk4', 5:'hsk5', 6:'hsk6', 0:'hsk0' };
  return map[level] ?? 'hsk0';
}

function formatDate(iso) {
  const d = new Date(iso);
  return isNaN(d) ? iso : d.toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' });
}

function selectedHskLevels() {
  return [...document.querySelectorAll('input[name="hsk"]:checked')]
    .map(cb => cb.value)
    .join(',');
}

// -----------------------------------------------------------------------
// Episode sidebar
// -----------------------------------------------------------------------
async function loadEpisodes() {
  try {
    const res = await fetch('/episodes');
    const episodes = await res.json();
    const list = $('episode-list');
    const empty = $('sidebar-empty');

    if (episodes.length === 0) {
      empty.style.display = 'block';
      return;
    }

    empty.style.display = 'none';
    // Clear existing episode items (keep the empty placeholder)
    [...list.querySelectorAll('.ep-item')].forEach(el => el.remove());

    episodes.forEach(ep => {
      const li = document.createElement('li');
      li.className = 'ep-item';
      const btn = document.createElement('button');
      btn.dataset.id = ep.id;
      btn.innerHTML = `
        <span class="ep-title">${escapeHtml(ep.title)}</span>
        <span class="ep-date">${formatDate(ep.created_at)}</span>
      `;
      btn.addEventListener('click', () => loadEpisodeResults(ep.id, btn));
      li.appendChild(btn);
      list.appendChild(li);
    });
  } catch (err) {
    console.error('Failed to load episodes:', err);
  }
}

async function loadEpisodeResults(episodeId, btn) {
  // Mark active
  document.querySelectorAll('#episode-list button').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');

  currentEpisodeId = episodeId;
  const hsk = selectedHskLevels() || 'all';
  const url = `/episodes/${episodeId}/words?hsk_levels=${encodeURIComponent(hsk)}`;
  const res = await fetch(url);
  const words = await res.json();
  currentWords = words;
  renderResults(words, episodeId);
}

// -----------------------------------------------------------------------
// Progress stages
// -----------------------------------------------------------------------
const STAGES = ['downloading', 'transcribing', 'extracting', 'done'];

function resetStages() {
  STAGES.forEach(s => {
    const el = $(`stage-${s}`);
    if (el) { el.className = 'stage-item'; }
  });
}

function setStage(stageName) {
  const idx = STAGES.indexOf(stageName);
  STAGES.forEach((s, i) => {
    const el = $(`stage-${s}`);
    if (!el) return;
    if (i < idx) el.className = 'stage-item done';
    else if (i === idx) el.className = 'stage-item active';
    else el.className = 'stage-item';
  });
}

function setStatus(msg, hasSpinner = true) {
  $('status-msg').innerHTML = (hasSpinner ? '<span class="spinner"></span>' : '') + escapeHtml(msg);
}

// -----------------------------------------------------------------------
// Analyze via SSE
// -----------------------------------------------------------------------
function doAnalyze() {
  const url = $('url-input').value.trim();
  if (!url) { $('url-input').focus(); return; }

  const model = $('model-select').value;
  const hsk = selectedHskLevels() || 'all';

  // Show progress, hide results content
  $('analyze-btn').disabled = true;
  $('progress-section').classList.add('visible');
  $('results-section').classList.add('visible');
  $('empty-state').style.display = 'none';
  $('results-content').style.display = 'none';
  resetStages();
  setStatus('Connecting…');

  const params = new URLSearchParams({ url, model, hsk_levels: hsk });
  const evtSrc = new EventSource(`/analyze/stream?${params}`);

  evtSrc.onmessage = e => {
    const data = JSON.parse(e.data);
    const { stage, message, result } = data;

    if (stage === 'error') {
      setStatus(`Error: ${message}`, false);
      STAGES.forEach(s => { const el = $(`stage-${s}`); if (el) el.classList.remove('active'); });
      $('stage-done').className = 'stage-item error';
      $('analyze-btn').disabled = false;
      evtSrc.close();
      return;
    }

    setStage(stage);
    setStatus(message, stage !== 'done');

    if (stage === 'done' && result) {
      evtSrc.close();
      currentEpisodeId = result.episode_id;
      currentWords = result.words;
      renderResults(result.words, result.episode_id);
      $('analyze-btn').disabled = false;
      loadEpisodes();  // refresh sidebar
    }
  };

  evtSrc.onerror = () => {
    setStatus('Connection error.', false);
    $('analyze-btn').disabled = false;
    evtSrc.close();
  };
}

// -----------------------------------------------------------------------
// Render results
// -----------------------------------------------------------------------
function renderResults(words, episodeId) {
  $('progress-section').classList.remove('visible');
  $('results-content').style.display = 'block';

  const levelSet = [...new Set(words.map(w => w.hsk_level))].sort((a, b) => {
    if (a === 0) return 1;
    if (b === 0) return -1;
    return a - b;
  });

  // Summary
  const totalWords = words.length;
  const levelCount = levelSet.length;
  $('summary-text').textContent = `${totalWords} word${totalWords !== 1 ? 's' : ''} found across ${levelCount} HSK level${levelCount !== 1 ? 's' : ''}`;

  // Export button
  $('export-btn').onclick = () => {
    const hsk = selectedHskLevels() || 'all';
    window.location.href = `/episodes/${episodeId}/export.csv?hsk_levels=${encodeURIComponent(hsk)}`;
  };

  // Filter tabs
  activeTab = 'all';
  buildFilterTabs(words, levelSet);

  // Word sections
  renderWordSections(words, levelSet, null);
}

function buildFilterTabs(words, levelSet) {
  const tabs = $('filter-tabs');
  tabs.innerHTML = '';

  const makeTab = (label, value) => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (value === 'all' ? ' active' : '');
    btn.textContent = label;
    btn.dataset.tab = value;
    btn.addEventListener('click', () => {
      activeTab = value;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const filtered = value === 'all' ? words : words.filter(w => w.hsk_level === parseInt(value, 10));
      const sections = value === 'all' ? levelSet : [parseInt(value, 10)];
      renderWordSections(filtered, sections, value === 'all' ? null : parseInt(value, 10));
    });
    return btn;
  };

  tabs.appendChild(makeTab(`All (${words.length})`, 'all'));
  levelSet.forEach(lv => {
    const count = words.filter(w => w.hsk_level === lv).length;
    tabs.appendChild(makeTab(`${hskLabel(lv)} (${count})`, String(lv)));
  });
}

function renderWordSections(words, levelSet, singleLevel) {
  const container = $('word-sections');
  container.innerHTML = '';

  const sections = singleLevel !== null ? [singleLevel] : levelSet;

  sections.forEach(lv => {
    const group = words.filter(w => w.hsk_level === lv);
    if (!group.length) return;

    const sec = document.createElement('div');
    sec.className = 'hsk-section';

    const colorVar = `var(--${hskColor(lv)})`;
    sec.innerHTML = `
      <div class="hsk-section-header">
        <h3 style="color:${colorVar}">${hskLabel(lv)}</h3>
        <span class="hsk-section-count">${group.length} word${group.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="word-grid"></div>
    `;

    const grid = sec.querySelector('.word-grid');
    group.forEach(w => grid.appendChild(makeWordCard(w)));

    container.appendChild(sec);
  });
}

function makeWordCard(w) {
  const card = document.createElement('div');
  card.className = 'word-card';

  const lv = w.hsk_level;
  const badgeClass = `hsk-badge lv${lv}`;

  card.innerHTML = `
    <div class="word-card-top">
      <span class="word-char">${escapeHtml(w.word)}</span>
      <span class="word-pinyin">${escapeHtml(w.pinyin)}</span>
    </div>
    <div class="word-meta">
      <span class="${badgeClass}">${hskLabel(lv)}</span>
      <span class="word-freq">×${w.frequency}</span>
    </div>
    <div class="word-contexts">
      ${w.contexts.map(c => `<div class="context-sentence">${escapeHtml(c)}</div>`).join('')}
    </div>
  `;

  // Toggle context on click
  card.addEventListener('click', () => {
    const ctx = card.querySelector('.word-contexts');
    ctx.classList.toggle('open');
  });

  return card;
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// -----------------------------------------------------------------------
// Event wiring
// -----------------------------------------------------------------------
$('analyze-btn').addEventListener('click', doAnalyze);

$('url-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') doAnalyze();
});

// Initial load
loadEpisodes();
</script>
